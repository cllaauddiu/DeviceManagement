<div class="auth-wrapper">
  <div class="auth-card">
    <h1>Autentificare</h1>
    <p class="subtitle">Intră în contul tău</p>

    @if (error()) {
      <div class="alert alert-error">{{ error() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="login()">
      <div class="field">
        <label for="email">Email *</label>
        <input id="email" formControlName="email" type="email" placeholder="email@exemplu.com" [class.invalid]="isInvalid('email')" />
        @if (isInvalid('email')) { <span class="error-msg">Email valid obligatoriu</span> }
      </div>

      <div class="field">
        <label for="password">Parolă *</label>
        <input id="password" formControlName="password" type="password" placeholder="Parola ta" [class.invalid]="isInvalid('password')" />
        @if (isInvalid('password')) { <span class="error-msg">Câmp obligatoriu</span> }
      </div>

      <button type="submit" class="btn btn-primary btn-full" [disabled]="loading()">
        {{ loading() ? 'Se autentifică...' : 'Autentifică-te' }}
      </button>
    </form>

    <p class="auth-link">Nu ai cont? <a routerLink="/register">Înregistrează-te</a></p>
  </div>
</div>
